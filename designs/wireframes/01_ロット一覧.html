<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ロット一覧</title>
  <style>
    /* リセット・ベース */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      color: #333;
    }

    /* ヘッダー */
    header {
      background: #fff;
      border-bottom: 1px solid #ccc;
      padding: 12px 24px;
    }
    header h1 {
      font-size: 18px;
      font-weight: bold;
    }

    /* メインコンテンツ */
    main {
      padding: 24px;
      max-width: 960px;
      margin: 0 auto;
    }

    /* ロットカード一覧 */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    /* カード */
    .card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 16px;
    }
    .card .lot-id {
      font-size: 12px;
      color: #888;
      margin-bottom: 6px;
    }
    .card .farm-name {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 4px;
    }
    .card .detail {
      font-size: 14px;
      color: #555;
    }

    /* 0件メッセージ */
    .empty-message {
      color: #999;
      text-align: center;
      margin-top: 80px;
      font-size: 15px;
    }

    /* ロット登録ボタン（右下固定） */
    .fab {
      position: fixed;
      right: 32px;
      bottom: 32px;
      background: #4a90d9;
      color: #fff;
      border: none;
      border-radius: 28px;
      padding: 14px 24px;
      font-size: 15px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .fab:hover {
      background: #357abf;
    }
  </style>
</head>
<body>

  <header>
    <h1>農場日報管理 — ロット一覧</h1>
  </header>

  <main>

    <!-- ロットが存在する場合 -->
    <div class="card-grid">

      <div class="card">
        <div class="lot-id">ロットID: LOT-001</div>
        <div class="farm-name">農場A</div>
        <div class="detail">ハウス名: ハウス1</div>
        <div class="detail">栽培本数: 120 本</div>
      </div>

      <div class="card">
        <div class="lot-id">ロットID: LOT-002</div>
        <div class="farm-name">農場B</div>
        <div class="detail">ハウス名: ハウス2</div>
        <div class="detail">栽培本数: 85 本</div>
      </div>

      <div class="card">
        <div class="lot-id">ロットID: LOT-003</div>
        <div class="farm-name">農場C</div>
        <div class="detail">ハウス名: ハウス3</div>
        <div class="detail">栽培本数: 200 本</div>
      </div>

    </div>

    <!-- ロットが0件の場合（通常は非表示にするか切り替える） -->
    <!--
    <div class="empty-message">ロットが登録されていません</div>
    -->

  </main>

  <!-- ロット登録ボタン -->
  <button class="fab">＋ ロット登録</button>

</body>
</html>
