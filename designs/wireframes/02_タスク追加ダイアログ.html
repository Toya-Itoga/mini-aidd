<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>タスク追加ダイアログ</title>
  <style>
    /* リセット・ベース */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      color: #333;
    }

    /* ヘッダー（背景画面のイメージ） */
    header {
      background: #fff;
      border-bottom: 1px solid #ccc;
      padding: 12px 24px;
    }
    header h1 {
      font-size: 18px;
      font-weight: bold;
    }

    /* オーバーレイ */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ダイアログ本体 */
    .dialog {
      background: #fff;
      border-radius: 8px;
      padding: 28px 32px;
      width: 400px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    }

    /* ダイアログタイトル */
    .dialog h2 {
      font-size: 17px;
      font-weight: bold;
      margin-bottom: 20px;
      border-bottom: 1px solid #eee;
      padding-bottom: 12px;
    }

    /* フォームグループ */
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 5px;
    }
    .form-group input {
      width: 100%;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 8px 10px;
      font-size: 14px;
    }
    .form-group input:focus {
      outline: none;
      border-color: #4a90d9;
    }

    /* ボタン列 */
    .button-row {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 24px;
    }
    .btn-cancel {
      background: #fff;
      border: 1px solid #aaa;
      border-radius: 4px;
      padding: 9px 20px;
      font-size: 14px;
      cursor: pointer;
      color: #555;
    }
    .btn-cancel:hover {
      background: #f0f0f0;
    }
    .btn-submit {
      background: #4a90d9;
      border: none;
      border-radius: 4px;
      padding: 9px 24px;
      font-size: 14px;
      cursor: pointer;
      color: #fff;
    }
    .btn-submit:hover {
      background: #357abf;
    }
  </style>
</head>
<body>

  <header>
    <h1>Todo管理 — タスク一覧</h1>
  </header>

  <!-- オーバーレイ + ダイアログ -->
  <div class="overlay">
    <div class="dialog">
      <h2>タスク追加</h2>

      <form>

        <!-- タスク名 -->
        <div class="form-group">
          <label>タスク名</label>
          <input type="text" placeholder="例: 要件定義書の作成">
        </div>

        <!-- 期限 -->
        <div class="form-group">
          <label>タスク期限</label>
          <input type="date">
        </div>

        <!-- ボタン -->
        <div class="button-row">
          <button type="button" class="btn-cancel">キャンセル</button>
          <button type="submit" class="btn-submit">登録</button>
        </div>

      </form>
    </div>
  </div>

</body>
</html>
