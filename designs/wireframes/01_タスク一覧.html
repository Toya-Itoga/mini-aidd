<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>タスク一覧</title>
  <style>
    /* リセット・ベース */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      color: #333;
    }

    /* ヘッダー */
    header {
      background: #fff;
      border-bottom: 1px solid #ccc;
      padding: 12px 24px;
    }
    header h1 {
      font-size: 18px;
      font-weight: bold;
    }

    /* メインコンテンツ */
    main {
      padding: 24px;
      max-width: 960px;
      margin: 0 auto;
    }

    /* カード一覧 */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }

    /* カード */
    .card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 16px;
    }

    /* タスク名 */
    .card .task-name {
      font-size: 15px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    /* 期限 */
    .card .deadline {
      font-size: 13px;
      color: #555;
      margin-bottom: 6px;
    }

    /* ステータスバッジ */
    .card .status {
      display: inline-block;
      font-size: 12px;
      padding: 2px 10px;
      border-radius: 12px;
      font-weight: bold;
    }
    .status.todo     { background: #e8e8e8; color: #555; }
    .status.doing    { background: #d6eaff; color: #1a6fc4; }
    .status.done     { background: #d4f5e2; color: #1a7a42; }

    /* 0件メッセージ */
    .empty-message {
      color: #999;
      text-align: center;
      margin-top: 80px;
      font-size: 15px;
    }
  </style>
</head>
<body>

  <header>
    <h1>Todo管理 — タスク一覧</h1>
  </header>

  <main>

    <!-- タスクが存在する場合 -->
    <div class="card-grid">

      <div class="card">
        <div class="task-name">要件定義書の作成</div>
        <div class="deadline">期限: 2026-04-10</div>
        <span class="status doing">進行中</span>
      </div>

      <div class="card">
        <div class="task-name">UIデザインのレビュー</div>
        <div class="deadline">期限: 2026-04-12</div>
        <span class="status todo">未着手</span>
      </div>

      <div class="card">
        <div class="task-name">ログイン機能の実装</div>
        <div class="deadline">期限: 2026-04-08</div>
        <span class="status done">完了</span>
      </div>

    </div>

    <!-- タスクが0件の場合 -->
    <!--
    <div class="empty-message">タスクが登録されていません</div>
    -->

  </main>

</body>
</html>
