<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>農場日報管理アプリ</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="/static/js/theme.js"></script>
  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js"></script>
  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>
  <div class="app-layout" x-data="{ activeMenu: 'lots' }">

    <!-- ヘッダー -->
    <header class="app-header">
      <h1>🌱農場日報管理アプリ</h1>
      <button id="themeToggle" class="btn btn-theme" onclick="toggleTheme()">ダークモード</button>
    </header>

    <div class="app-body">

      <!-- サイドバー -->
      <nav class="sidebar">
        <button
          class="sidebar-item"
          :class="{ 'sidebar-item--active': activeMenu === 'lots' }"
          @click="activeMenu = 'lots'"
          hx-get="/lots"
          hx-target="#content"
          hx-swap="innerHTML"
          hx-push-url="false">
          ロット管理
        </button>
        <button
          class="sidebar-item"
          :class="{ 'sidebar-item--active': activeMenu === 'users' }"
          @click="activeMenu = 'users'"
          hx-get="/users"
          hx-target="#content"
          hx-swap="innerHTML"
          hx-push-url="false">
          ユーザ管理
        </button>
        <!-- <div class="sidebar-label">サイドバー</div> -->
      </nav>

      <!-- コンテンツエリア（初期表示: ロット管理） -->
      <main
        id="content"
        class="content-area"
        hx-get="/lots"
        hx-trigger="load">
      </main>

    </div>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
