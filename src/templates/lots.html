<!-- ロット管理 パーシャル（HTMX経由でコンテンツエリアに挿入） -->
<div x-data="lotDialog()">

  <!-- コンテンツヘッダー -->
  <div class="content-header">
    <h2 class="content-title">ロット一覧</h2>
    <button class="btn btn-primary" @click="openDialog()">＋ 新規登録</button>
  </div>

  <!-- ロットカード一覧 -->
  {% if lots %}
  <div class="lot-grid">
    {% for lot in lots %}
    <div class="lot-card">
      <div class="lot-id">ロットID: {{ lot.lot_id }}</div>
      <div class="farm-name">{{ lot.farm_name }}</div>
      <div class="detail">ハウス: {{ lot.house_name }}</div>
      <div class="detail">栽培本数: {{ lot.plant_count }} 本</div>
      <div style="margin-top:10px;">
        <button class="btn btn-secondary" @click="openEditDialog('{{ lot.lot_id }}')">編集</button>
      </div>
    </div>
    {% endfor %}
  </div>
  {% else %}
  <div class="empty-state">ロットが登録されていません</div>
  {% endif %}

  <!-- ロット登録 / 編集ダイアログ -->
  {% include 'component/lot_dialog.html' %}

</div>
